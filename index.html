<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:
    'Segoe UI',
    system-ui,
    -apple-system,
    Arial,
    sans-serif,
    'Apple Color Emoji',
    'Segoe UI Emoji',
    'Noto Color Emoji';
  color:white;
  text-align:center;
  overflow:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  z-index:-2;
  transition:opacity 2s;
}
#bg1{opacity:1;}
#bg2{opacity:0;}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  opacity:0.5;
  z-index:-1;
}

/* CONTENT */
.content{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
}

h1{font-size:18px;}
h2{
  font-size:14px;
  margin-bottom:6px;
  text-shadow:0 0 8px rgba(255,100,150,0.8);
}

.profile{width:100px;border-radius:50%;}
.cake{width:120px;margin:8px;}

.btn{
  padding:8px 18px;
  background:#ff4e80;
  border-radius:20px;
  cursor:pointer;
}

/* GIF */
.gif{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  max-width:380px;
  aspect-ratio:16/9;
  border-radius:12px;
  overflow:hidden;
  display:none;
}
.gif img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LETTER */
.letter{
  position:fixed;
  top:170px;
  left:50%;
  transform:translateX(-50%);
  width:75%;
  max-width:260px;
  aspect-ratio:4/5;
  background:url('letter.png') center/cover no-repeat;
  color:#333;
  padding:16px;
  border-radius:12px;
  display:none;
  overflow-y:auto;
  text-align:left;
  z-index:5;
}

.letter p{
  margin-bottom:10px;
  line-height:1.5;
  font-size:13px;
}

.close{
  position:absolute;
  top:8px;
  right:10px;
  font-size:12px;
  cursor:pointer;
}

/* ENVELOPE */
.envelope{
  display:none;
  position:fixed;
  bottom:75px;
  left:50%;
  transform:translateX(-50%);
  width:200px;
  height:130px;
  cursor:pointer;
  z-index:3;
}

.env-body{
  width:100%;
  height:100%;
  background:url('envelope.png') center/cover no-repeat;
  position:absolute;
}

.flap{
  position:absolute;
  top:0;
  width:100%;
  height:60%;
  background:linear-gradient(#f5ebd8,#e0d3b8);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:0.6s;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3));
}
.envelope.open .flap{
  transform:rotateX(-180deg);
}

/* TEXT */
.char{
  opacity:0;
  animation:fade .3s forwards;
}
@keyframes fade{to{opacity:1;}}

/* MUSIC */
.music-btn{
  position:fixed;
  top:10px;
  right:10px;
  width:32px;
  height:32px;
  background:#ff4e80;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
.music-btn img{width:16px;}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:55px;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-around;
  align-items:center;
}
.navbar a{
  color:white;
  font-size:11px;
  text-decoration:none;
}
.navbar img{width:18px;}

/* SAVE */
.save-btn{
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.5);
  padding:6px 10px;
  border-radius:12px;
  font-size:12px;
  cursor:pointer;
  z-index:9999;
}

/* SNOW */
.snow{
  position:fixed;
  bottom:-10px;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  animation:floatUp linear forwards;
}
@keyframes floatUp{
  to{transform:translateY(-110vh);opacity:0;}
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:6px;height:6px;
  animation:burst 1s ease-out forwards;
}
@keyframes burst{
  to{transform:translate(var(--x),var(--y));opacity:0;}
}

/* FINAL CHOICE */
#finalChoice{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:1s;
z-index:99999;
}

.choice{
padding:10px 20px;
border-radius:20px;
margin:6px;
cursor:pointer;
}

.save{background:#ff4e80;}
.restart{background:#444;}
</style>
</head>

<body>

<div class="save-btn" onclick="saveMoment()">📸 Simpan</div>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<div class="content">
<h1>Happyyy Birthdayyyy</h1>
<h2>Rachel Sandra Mariam</h2>

<img src="hbdachel.jpg" class="profile"><br>
<img src="cake.jpg" class="cake"><br>

<div class="btn" id="startBtn" onclick="start()">CLICKKK DISINIIII</div>
</div>

<div class="gif" id="gifBox">
<img src="anime-hbd.gif">
</div>

<div class="letter" id="letter1">
<div class="close" onclick="closeAll()">❌</div>
<div id="text1"></div>
<p style="font-size:11px;">adaa surattt keduaa klikk disiniii</p>
</div>

<div class="letter" id="letter2">
<div class="close" onclick="closeAll()">❌</div>
<div id="text2"></div>
</div>

<div class="envelope" id="env" onclick="openEnvelope()">
  <div class="env-body"></div>
  <div class="flap"></div>
</div>

<div class="music-btn" onclick="toggleMusic()">
<img src="https://twemoji.maxcdn.com/v/latest/72x72/1f50a.png">
</div>

<audio id="music" loop>
<source src="hbd.mp3">
</audio>

<div class="navbar">
<a href="index.html"><img src="home.png"><br>Home</a>
<a href="kenangan.html"><img src="gallery.png"><br>Kenangan</a>
<a href="tentang.html"><img src="info.png"><br>Tentang</a>
<a href="creator.html"><img src="user.png"><br>Pembuat</a>
</div>

<!-- FINAL CHOICE -->
<div id="finalChoice">
<h2>Terimakasii sudaaa membacaaa semuanyaa </h2>
<div class="choice save" onclick="saveMoment()">📸 Simpannn surattt</div>
<div class="choice restart" onclick="restart()">🔁 Ulangiii Lagiiii</div>
</div>

<script>

/* SAVE */
function saveMoment(){
alert("Kalauuu mauuuu simpennn iniii\nTekennn volume + power 📸");
}

/* FINAL */
function showFinal(){
let el=document.getElementById("finalChoice");
el.style.opacity=1;
el.style.pointerEvents="auto";
}
function restart(){location.reload();}

/* BACKGROUND */
const images=["bg1.jpg","bg2.jpg","bg3.jpg"];
let i=1,active=1;
document.getElementById("bg1").style.backgroundImage=`url(${images[0]})`;

setInterval(()=>{
let next=(active===1)?2:1;
document.getElementById("bg"+next).style.backgroundImage=`url(${images[i]})`;
document.getElementById("bg"+next).style.opacity=1;
document.getElementById("bg"+active).style.opacity=0;
active=next;
i=(i+1)%images.length;
},5000);

/* MUSIC */
const music=document.getElementById("music");
document.addEventListener("click",()=>{music.play().catch(()=>{})},{once:true});
function toggleMusic(){music.paused?music.play():music.pause();}

/* SNOW */
setInterval(()=>{
let s=document.createElement("div");
s.className="snow";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(s);
setTimeout(()=>s.remove(),7000);
},400);

/* CONFETTI */
function confetti(){
for(let i=0;i<4;i++){
let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight*0.4;
for(let j=0;j<6;j++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=x+"px";
c.style.top=y+"px";
c.style.setProperty('--x',(Math.random()*150-75)+"px");
c.style.setProperty('--y',(Math.random()*150-75)+"px");
c.style.background=`hsl(${Math.random()*360},100%,60%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
}
}
}

/* FLOW */
let state=0;
function start(){startBtn.style.pointerEvents="none";env.style.display="block";}
function openEnvelope(){
env.classList.add("open");
confetti();
setTimeout(()=>{
gifBox.style.display="block";
letter1.style.display="block";
typeText(text1,msg1);
state=1;
},600);
}
function closeAll(){
gifBox.style.display="none";
letter1.style.display="none";
letter2.style.display="none";
env.style.display="none";
env.classList.remove("open");
startBtn.style.pointerEvents="auto";
state=0;
}

/* TEXT */
const msg1="Selamattt ulanggg tahunn kamuuu 🤍\n\nSemogaaa semuaa impiannn\nkamuuuu tercapaiii \n\njadiii anakk baikkk bisaaa\nmembanggakannn mamahhh kamuuu\n\nDannn semogaaa panjanggg\numurrrr yaaaaawww\n\nTerimakasihhh sudahhhh hadirrr\ndiii hiduppp akuuuu ✨";
const msg2="akuuuu buattt iniiii sudaaaa\ndariii jauhhh jauhhhh hariii\n\ndannn benerrr benerrr nungguinnn\nhariii iniii untukkk melihattt reaksiii\nkamuuuu hehehee C:\n\n- Iyannnnn";

function typeText(el,msg){
el.innerHTML="";
let paragraphs=msg.split("\n\n");
let pIndex=0;

function typeP(){
if(pIndex>=paragraphs.length) return;
let p=document.createElement("p");
el.appendChild(p);
let text=paragraphs[pIndex];
let i=0;
let inter=setInterval(()=>{
if(i<text.length){
let span=document.createElement("span");
span.className="char";
if(text[i]===" ") span.innerHTML="&nbsp;";
else span.textContent=text[i];
p.appendChild(span);
i++;
}else{
clearInterval(inter);
pIndex++;
setTimeout(typeP,300);
}
},25);
}
typeP();
}

/* PINDAH */
document.addEventListener("click",(e)=>{
if(e.target.closest(".close")) return;
if(state===1 && e.target.closest("#letter1")){
letter1.style.display="none";
letter2.style.display="block";
typeText(text2,msg2);
state=2;

/* 🔥 TRIGGER FINAL */
setTimeout(showFinal,8000);

}
});
</script>

</body>
</html>
